[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "cachyframe-ui"
version = "0.1.0"
description = "Reusable Qt UI components for CachyFrame"
requires-python = ">=3.12"
dependencies = [
  "PySide6>=6.8",
  "cachyframe-core",
]

[tool.hatch.build.targets.wheel]
packages = ["src/cachyframe_ui"]

[tool.uv.sources]
cachyframe-core = { workspace = true }
