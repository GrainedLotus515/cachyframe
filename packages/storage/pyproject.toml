[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "cachyframe-storage"
version = "0.1.0"
description = "Persistence and repositories for CachyFrame"
requires-python = ">=3.12"
dependencies = [
  "aiosqlite>=0.21",
  "alembic>=1.15",
  "asyncpg>=0.30",
  "redis>=5.2",
  "sqlalchemy>=2.0",
  "cachyframe-core",
]

[tool.hatch.build.targets.wheel]
packages = ["src/cachyframe_storage"]

[tool.uv.sources]
cachyframe-core = { workspace = true }

